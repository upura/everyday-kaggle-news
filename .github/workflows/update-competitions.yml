# 開催中の Kaggle コンペ一覧を毎日取得し、docs/competitions.json を更新する
# docs/calendar.md(コンペ開催カレンダー)がこのデータを表示する
# 要リポジトリシークレット: KAGGLE_API_TOKEN(kaggle.com/settings で発行する KGAT_ 形式。
# 従来形式の KAGGLE_USERNAME / KAGGLE_KEY でも可)
name: Update competitions

on:
  schedule:
    - cron: "0 21 * * *" # 毎日 06:00 JST
  workflow_dispatch:

permissions:
  contents: write
  actions: write # データ更新後に Pages デプロイを起動するため

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Fetch active competitions
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: python3 tools/fetch_competitions.py docs/competitions.json
      - name: Commit and push if changed
        id: commit
        run: |
          if git diff --quiet -- docs/competitions.json; then
            echo "No changes"
            echo "pushed=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/competitions.json
          git commit -m "Update competitions data ($(date -u +%Y-%m-%d))"
          git push
          echo "pushed=1" >> "$GITHUB_OUTPUT"
      # GITHUB_TOKEN による push は push イベントのワークフローを起動しないため、明示的にデプロイを起動する
      - name: Trigger Pages deploy
        if: steps.commit.outputs.pushed == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run jekyll-gh-pages.yml --repo "$GITHUB_REPOSITORY"
